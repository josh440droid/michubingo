<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Addis Bingo Clone</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --tg-theme-bg-color: #000000;
            --tg-theme-text-color: #ffffff;
            --bingo-red: #ff0000;
        }

        body {
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .header h1 {
            color: var(--bingo-red);
            font-size: 2.2rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Bingo Card Structure */
        .bingo-card {
            width: 90%;
            max-width: 360px;
            background: var(--bingo-red);
            padding: 10px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .cell {
            background: white;
            color: black;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .cell:active {
            transform: scale(0.9);
        }

        .cell.marked {
            background: #333 !important;
            color: white !important;
            position: relative;
        }

        .cell.marked::after {
            content: "";
            position: absolute;
            width: 80%;
            height: 80%;
            border: 2px solid var(--bingo-red);
            border-radius: 50%;
        }

        /* Floating Ball Display */
        .ball-area {
            margin-top: 30px;
            text-align: center;
        }

        #current-ball {
            width: 70px;
            height: 70px;
            background: white;
            color: var(--bingo-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            border: 4px solid var(--bingo-red);
            margin: 0 auto 15px;
        }

        .btn-draw {
            background: var(--bingo-red);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,0,0,0.3);
        }

        .btn-draw:active {
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ADDIS BINGO</h1>
    </div>

    <div class="bingo-card" id="card-grid"></div>

    <div class="ball-area">
        <div id="current-ball">--</div>
        <button class="btn-draw" onclick="drawBall()">LAKKOOFSA FIDI</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const grid = document.getElementById('card-grid');
        const ballDisplay = document.getElementById('current-ball');
        let pool = Array.from({length: 75}, (_, i) => i + 1);

        function createCard() {
            // Columns B(1-15), I(16-30), N(31-45), G(46-60), O(61-75)
            const cardData = [];
            for(let i=0; i<5; i++) {
                let col = Array.from({length: 15}, (_, j) => (i*15)+j+1)
                    .sort(() => Math.random() - 0.5)
                    .slice(0, 5);
                cardData.push(col);
            }

            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if(r === 2 && c === 2) {
                        cell.innerText = "FREE";
                        cell.classList.add('marked');
                    } else {
                        cell.innerText = cardData[c][r];
                        cell.onclick = function() {
                            this.classList.toggle('marked');
                            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                        }
                    }
                    grid.appendChild(cell);
                }
            }
        }

        function drawBall() {
            if(pool.length === 0) return;
            const idx = Math.floor(Math.random() * pool.length);
            const num = pool.splice(idx, 1)[0];
            ballDisplay.innerText = num;
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        createCard();
    </script>
</body>
</html>
