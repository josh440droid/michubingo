<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MICHUU BINGO</title> <!-- 1. Title Changed -->
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --bingo-red: #ff0000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            user-select: none;
        }

        h1 {
            color: var(--bingo-red);
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .bingo-card {
            width: 90%;
            max-width: 360px;
            background: var(--bingo-red);
            padding: 10px;
            border-radius: 15px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cell {
            background: white;
            color: black;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.1s;
        }

        .cell.marked {
            background: #333 !important;
            color: white !important;
            position: relative;
        }

        .cell.marked::after {
            content: "";
            position: absolute;
            width: 80%;
            height: 80%;
            border: 2px solid var(--bingo-red);
            border-radius: 50%;
        }

        .controls {
            margin-top: 30px;
            text-align: center;
        }

        #ball-display {
            width: 80px;
            height: 80px;
            background: white;
            color: var(--bingo-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 900;
            border: 5px solid var(--bingo-red);
            margin: 0 auto 15px;
        }

        .btn-draw {
            background: var(--bingo-red);
            color: white;
            border: none;
            padding: 15px 45px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(255,0,0,0.4);
        }
    </style>
</head>
<body>
    <h1>MICHUU BINGO</h1> <!-- 2. Main Header Changed -->
    <div class="bingo-card" id="grid"></div>
    <div class="controls">
        <div id="ball-display">--</div>
        <button class="btn-draw" onclick="drawBall()">DRAW NUMBER</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const grid = document.getElementById('grid');
        const display = document.getElementById('ball-display');
        let pool = Array.from({length: 75}, (_, i) => i + 1);

        function setupCard() {
            const data = [];
            for(let i=0; i<5; i++) {
                let col = Array.from({length: 15}, (_, j) => (i*15)+j+1)
                    .sort(() => Math.random() - 0.5).slice(0, 5);
                data.push(col);
            }
            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if(r === 2 && c === 2) {
                        cell.innerText = "FREE";
                        cell.classList.add('marked');
                    } else {
                        cell.innerText = data[c][r];
                        cell.onclick = function() {
                            this.classList.toggle('marked');
                            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                        }
                    }
                    grid.appendChild(cell);
                }
            }
        }

        function drawBall() {
            if(pool.length === 0) return;
            const idx = Math.floor(Math.random() * pool.length);
            const num = pool.splice(idx, 1);
            display.innerText = num;
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }
        setupCard();
    </script>
</body>
</html>
